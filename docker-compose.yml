services:
  timescaledb:
    image: timescale/timescaledb:2.18.1-pg17 # This is the lightweight version using Alpine
    environment:
      POSTGRES_DB: postgres # This is the default, but being explicit here.
      POSTGRES_USER: postgres # Also default, also being explicit.
      POSTGRES_PASSWORD: secret
    ports:
      - 5469:5432 # Exposing 5469 for development. Should remove in production.
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # Add this line
  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_cache:/data
  grafana:
    image: grafana/grafana:latest
    ports:
      - 3000:3000
    volumes:
      - ./webapp/grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
      - ./webapp/grafana/dashboards:/var/lib/grafana/dashboards
volumes:
  timescale_data:
  redis_cache:
  grafana_data:
